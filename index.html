                                            </button>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                 </div>
             )}
          </div>
        );
      };

      const RecipesView = () => (
          <div className="px-4 pb-24">
             <div className="flex justify-between items-center mb-4 px-1 mt-4">
                <h2 className="text-gray-800 font-semibold">Mis Recetas</h2>
                <button onClick={() => setActiveForm('recipe')} className="bg-indigo-600 text-white px-3 py-1.5 rounded-xl text-sm font-medium flex items-center gap-1 active:bg-indigo-700 transition-colors">
                  <IconPlusCircle size={16} /> Crear
                </button>
             </div>
             
             {recipes.length === 0 ? (
                 <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center text-gray-500">
                    Aún no has creado recetas.
                 </div>
             ) : (
                 <div className="space-y-4">
                     {recipes.map(recipe => (
                         <div key={recipe.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                             <div className="flex justify-between items-start mb-3">
                                 <h3 className="font-bold text-gray-800 text-lg">{recipe.name}</h3>
                                 <div className="flex items-center gap-3">
                                    <span className="font-bold text-indigo-600">{formatMoney(recipe.totalCost)}</span>
                                    <button onClick={() => handleDeleteRecipe(recipe.id)} className="text-gray-300 hover:text-red-500"><IconTrash size={18}/></button>
                                 </div>
                             </div>
                             <div className="text-sm text-gray-500 space-y-2 bg-gray-50 p-3 rounded-xl">
                                 {recipe.ingredients.map((ing, idx) => (
                                     <div key={idx} className="flex justify-between items-center border-b border-gray-200/50 pb-1 last:border-0 last:pb-0">
                                         <div>
                                            <span className="font-medium text-gray-700">{ing.qty}x</span> {ing.productName} 
                                            <span className="text-[10px] ml-1 bg-gray-200 px-1.5 py-0.5 rounded text-gray-600">{ing.supplier}</span>
                                         </div>
                                         <span className="text-gray-700">{formatMoney(ing.cost)}</span>
                                     </div>
                                 ))}
                             </div>
                         </div>
                     ))}
                 </div>
             )}
          </div>
      );

      const HistoricalView = () => {
        const getHistoricalData = () => {
            const monthlyData = {};
            const realTransactions = transactions.filter(t => t.status !== 'pendiente');
            realTransactions.forEach(tx => {
                const d = new Date(tx.date);
                const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                const monthName = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(d);
                const monthLabel = monthName.charAt(0).toUpperCase() + monthName.slice(1);
                if (!monthlyData[key]) monthlyData[key] = { key, monthLabel, sales: 0, expenses: 0 };
                if (tx.type === 'expense') monthlyData[key].expenses += tx.amount;
                else if (tx.type === 'income') monthlyData[key].sales += tx.amount;
            });
            return Object.values(monthlyData).sort((a, b) => b.key.localeCompare(a.key));
        };
        const data = getHistoricalData();
        return (
            <div className="px-4 pb-24">
                <h2 className="text-gray-800 font-semibold mb-4 px-1 mt-4">Resumen Mensual (Solo Pagados)</h2>
                {data.length === 0 ? (
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center text-gray-500">Sin registros reales.</div>
                ) : (
                    <div className="space-y-4">
                        {data.map(month => {
                            const margenBruto = month.sales - month.expenses;
                            return (
                                <div key={month.key} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-indigo-50 px-4 py-3 border-b border-indigo-100 font-bold text-indigo-900">{month.monthLabel}</div>
                                    <div className="p-4 space-y-3">
                                        <div className="flex justify-between items-center text-sm"><span className="text-gray-500">Ingresos</span><span className="font-semibold text-green-600">{formatMoney(month.sales)}</span></div>
                                        <div className="flex justify-between items-center text-sm"><span className="text-gray-500">Gastos (Compras/Otros)</span><span className="font-semibold text-red-600">{formatMoney(month.expenses)}</span></div>
                                        <div className="h-px w-full bg-gray-100 my-2"></div>
                                        <div className="flex justify-between items-center"><span className="font-medium text-gray-800">Margen Bruto</span><span className={`font-bold text-lg ${margenBruto >= 0 ? 'text-indigo-600' : 'text-red-600'}`}>{formatMoney(margenBruto)}</span></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50 max-w-md mx-auto relative font-sans">
          
          <datalist id="prod-list">
              {availableProducts.map(prod => <option key={prod} value={prod} />)}
          </datalist>

          <NotificationToasts />
          <ConfirmModal />

          {activeTab === 'home' && <Header title="Mi Negocio" />}
          {activeTab === 'finance' && <Header title="Control de Caja" />}
          {activeTab === 'inventory' && <Header title="Stock" />}
          {activeTab === 'suppliers' && <Header title="Proveedores y Compras" />}
          {activeTab === 'recipes' && <Header title="Calculadora de Recetas" />}
          {activeTab === 'pending' && <Header title="Deudas y Cobranza" />}
          {activeTab === 'history' && <Header title="Reporte Histórico" />}

          <main>
            {activeTab === 'home' && <HomeView />}
            {activeTab === 'finance' && <FinanceView />}
            {activeTab === 'inventory' && <InventoryView />}
            {activeTab === 'suppliers' && <SuppliersView />}
            {activeTab === 'recipes' && <RecipesView />}
            {activeTab === 'pending' && <PendingView />}
            {activeTab === 'history' && <HistoricalView />}
          </main>

          {/* Menú Inferior (Scroll Horizontal) */}
          <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-40 overflow-x-auto">
            <div className="flex justify-between p-1 pb-6 sm:pb-1 min-w-max px-2 gap-2">
                <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center px-3 py-2 rounded-xl transition-colors min-w-[60px] ${activeTab === 'home' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-400'}`}>
                  <IconHome size={22} /><span className="text-[9px] mt-1 font-medium">Inicio</span>
                </button>
                <button onClick={() => setActiveTab('finance')} className={`flex flex-col items-center px-3 py-2 rounded-xl transition-colors min-w-[60px] ${activeTab === 'finance' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-400'}`}>
                  <IconWallet size={22} /><span className="text-[9px] mt-1 font-medium">Caja</span>
                </button>
                <button onClick={() => setActiveTab('inventory')} className={`flex flex-col items-center px-3 py-2 rounded-xl transition-colors min-w-[60px] ${activeTab === 'inventory' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-400'}`}>
                  <IconPackage size={22} /><span className="text-[9px] mt-1 font-medium">Stock</span>
                </button>
                <button onClick={() => setActiveTab('suppliers')} className={`flex flex-col items-center px-3 py-2 rounded-xl transition-colors min-w-[60px] ${activeTab === 'suppliers' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-400'}`}>
                  <IconTruck size={22} /><span className="text-[9px] mt-1 font-medium">Prov.</span>
                </button>
                <button onClick={() => setActiveTab('recipes')} className={`flex flex-col items-center px-3 py-2 rounded-xl transition-colors min-w-[60px] ${activeTab === 'recipes' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-400'}`}>
                  <IconUtensils size={22} /><span className="text-[9px] mt-1 font-medium">Recetas</span>
                </button>
                <button onClick={() => setActiveTab('pending')} className={`flex flex-col items-center px-3 py-2 rounded-xl transition-colors min-w-[60px] ${activeTab === 'pending' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-400 relative'}`}>
                  <IconClipboard size={22} /><span className="text-[9px] mt-1 font-medium">Deudas</span>
                  {(pendingToCollect > 0 || pendingToPay > 0) && <span className="absolute top-1 right-2 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>}
                </button>
                <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center px-3 py-2 rounded-xl transition-colors min-w-[60px] ${activeTab === 'history' ? 'text-indigo-600 bg-indigo-50' : 'text-gray-400'}`}>
                  <IconBarChart size={22} /><span className="text-[9px] mt-1 font-medium">Historia</span>
                </button>
            </div>
          </nav>

          {/* FORMULARIO DE CONFIGURACIÓN / RESPALDOS */}
          {activeForm === 'settings' && (
              <FormModal title="Configuración y Respaldos" onClose={() => setActiveForm(null)}>
                <div className="space-y-6">
                  {/* Descarga Manual */}
                  <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                      <h4 className="font-bold text-gray-800 mb-1">Descargar Historial</h4>
                      <p className="text-xs text-gray-500 mb-3">Obtén un archivo Excel (.csv) con todos los registros guardados hasta ahora.</p>
                      <button onClick={downloadCSV} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg active:bg-emerald-700 transition-colors shadow-sm">
                          Descargar Archivo CSV
                      </button>
                  </div>

                  {/* Sincronización Automática con Sheets */}
                  <div>
                      <h4 className="font-bold text-gray-800 mb-1">Enlace a Google Sheets</h4>
                      <p className="text-xs text-gray-500 mb-3 leading-relaxed">
                          Pega aquí el enlace de tu App Script. Cada vez que registres algo en la app, se creará una fila automáticamente en tu Excel.
                      </p>
                      <input 
                          type="url" 
                          value={webhookUrl} 
                          onChange={e => setWebhookUrl(e.target.value)} 
                          className="w-full p-3 border border-gray-300 rounded-xl outline-none text-sm mb-3" 
                          placeholder="https://script.google.com/macros/s/..." 
                      />
                      <button 
                          onClick={() => {
                              localStorage.setItem('googleSheetsWebhook', webhookUrl);
                              setActiveForm(null);
                              showSuccess("Enlace guardado");
                          }} 
                          className="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg active:bg-indigo-700 transition-colors"
                      >
                          Guardar Enlace
                      </button>
                  </div>
                </div>
              </FormModal>
          )}

          {/* DEMÁS FORMULARIOS */}
          {activeForm === 'dailySale' && (
              <DailySaleForm onSave={handleSaveDailySale} onClose={() => setActiveForm(null)} />
          )}

          {activeForm === 'dailyReport' && dailyReportData && (
              <FormModal title="Reporte de Ventas Diarias" onClose={() => { setActiveForm(null); setDailyReportData(null); }}>
                  <div className="text-center mb-6">
                      <IconCheckCircle size={48} className="text-emerald-500 mx-auto mb-2" />
                      <p className="text-gray-600 text-sm">Tus ventas han sido registradas y el stock actualizado automáticamente.</p>
                  </div>
                  <div className="bg-gray-50 p-4 rounded-2xl border border-gray-200 space-y-3">
                      <div className="flex justify-between items-center">
                          <span className="font-medium text-gray-700 text-sm">Pagado en Efectivo</span>
                          <span className="font-bold text-green-600">{formatMoney(dailyReportData.totalEfectivo)}</span>
                      </div>
                      <div className="flex justify-between items-center">
                          <span className="font-medium text-gray-700 text-sm">Pagado por Transfer.</span>
                          <span className="font-bold text-blue-600">{formatMoney(dailyReportData.totalTransf)}</span>
                      </div>
                      <div className="flex justify-between items-center">
                          <span className="font-medium text-gray-700 text-sm">Dejado Por Cobrar</span>
                          <span className="font-bold text-red-500">{formatMoney(dailyReportData.totalPendiente)}</span>
                      </div>
                      <hr className="border-gray-300 my-2" />
                      <div className="flex justify-between items-center text-lg">
                          <span className="font-black text-gray-900">Total Vendido</span>
                          <span className="font-black text-indigo-700">{formatMoney(dailyReportData.total)}</span>
                      </div>
                  </div>
                  <button onClick={() => { setActiveForm(null); setDailyReportData(null); }} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-6 active:bg-indigo-700">
                      Cerrar Reporte
                  </button>
              </FormModal>
          )}

          {activeForm === 'purchase' && (
              <PurchaseForm onSave={handleSavePurchase} onClose={() => setActiveForm(null)} />
          )}

          {activeForm === 'recipe' && (
              <RecipeForm suppliersData={suppliersData} onSave={handleSaveRecipe} onClose={() => setActiveForm(null)} />
          )}

          {payingTx && (
            <FormModal title="Confirmar Pago" onClose={() => setPayingTx(null)}>
              <div className="mb-4 text-gray-700 text-sm">
                  <p>Estás a punto de registrar el pago de:</p>
                  <p className="font-bold text-lg mt-1 text-indigo-700">{payingTx.description}</p>
                  <p className="font-bold text-gray-900 mt-1">Total: {formatMoney(payingTx.amount)}</p>
              </div>
              <form onSubmit={(e) => {
                  e.preventDefault();
                  handleMarkAsPaid(payingTx.id, e.target.paymentMethod.value);
              }} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Método de Pago</label>
                    <select name="paymentMethod" className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white">
                      <option value="Efectivo">Efectivo</option>
                      <option value="Transferencia">Transferencia</option>
                    </select>
                  </div>
                  <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4 active:bg-indigo-700">
                    Confirmar Pago
                  </button>
              </form>
            </FormModal>
          )}

          {activeForm === 'expense' && (
            <FormModal title="Registrar Gasto" onClose={() => setActiveForm(null)}>
              <form onSubmit={(e) => handleAddTransaction(e, 'expense')} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Monto ($)</label>
                  <input type="number" name="amount" required className="w-full p-3 border border-gray-300 rounded-xl outline-none text-lg" placeholder="Ej. 15000" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Concepto</label>
                  <input type="text" name="description" required className="w-full p-3 border border-gray-300 rounded-xl outline-none" placeholder="Ej. Compra de materiales" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Estado del Pago</label>
                  <select name="status" className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white">
                    <option value="pagado">Pagado (Descontar de caja)</option>
                    <option value="pendiente">Pendiente (Por pagar)</option>
                  </select>
                </div>
                <button type="submit" className="w-full bg-red-600 text-white font-bold py-4 rounded-xl mt-4 active:bg-red-700">Guardar Gasto</button>
              </form>
            </FormModal>
          )}

          {activeForm === 'income' && (
            <FormModal title="Otro Ingreso (Sin stock)" onClose={() => setActiveForm(null)}>
              <form onSubmit={(e) => handleAddTransaction(e, 'income')} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Monto ($)</label>
                  <input type="number" name="amount" required className="w-full p-3 border border-gray-300 rounded-xl outline-none text-lg" placeholder="Ej. 50000" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Concepto</label>
                  <input type="text" name="description" required className="w-full p-3 border border-gray-300 rounded-xl outline-none" placeholder="Ej. Servicio prestado" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Estado del Pago</label>
                  <select name="status" className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white">
                    <option value="pagado">Pagado (Sumar a caja)</option>
                    <option value="pendiente">Pendiente (Por cobrar)</option>
                  </select>
                </div>
                <button type="submit" className="w-full bg-green-600 text-white font-bold py-4 rounded-xl mt-4 active:bg-green-700">Guardar Ingreso</button>
              </form>
            </FormModal>
          )}

          {activeForm === 'production' && (
            <FormModal title="Producción Diaria" onClose={() => setActiveForm(null)}>
              <form onSubmit={handleAddProduction} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Producto (Elige o escribe uno nuevo)</label>
                  <input type="text" name="product" list="prod-list" autoComplete="off" required className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white" placeholder="Ej. Alfajor de Maicena" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Unidades Producidas</label>
                  <input type="number" name="units" required className="w-full p-3 border border-gray-300 rounded-xl outline-none text-lg" placeholder="Ej. 50" />
                </div>
                <button type="submit" className="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl mt-4 active:bg-emerald-700">Sumar al Stock</button>
              </form>
            </FormModal>
          )}

          {activeForm === 'sale' && (
            <FormModal title="Registrar Venta" onClose={() => setActiveForm(null)}>
              <form onSubmit={handleAddSale} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Producto a Vender</label>
                  <select name="product" value={selectedProduct} onChange={(e) => setSelectedProduct(e.target.value)} className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white">
                    {availableProducts.map(prod => <option key={prod} value={prod}>{prod}</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Unidades</label>
                      <input type="number" name="units" required max={stockByProduct[selectedProduct] > 0 ? stockByProduct[selectedProduct] : ""} className="w-full p-3 border border-gray-300 rounded-xl outline-none text-lg" placeholder={`Max: ${stockByProduct[selectedProduct]}`} />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Total ($)</label>
                      <input type="number" name="amount" required className="w-full p-3 border border-gray-300 rounded-xl outline-none text-lg" placeholder="25000" />
                    </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Cliente / Detalle</label>
                  <input type="text" name="description" className="w-full p-3 border border-gray-300 rounded-xl outline-none" placeholder={`Ej. Venta de ${selectedProduct}`} />
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Estado del Pago</label>
                    <select name="status" className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white">
                      <option value="pagado">Pagado (Caja)</option>
                      <option value="pendiente">Pendiente (Cobrar)</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Método</label>
                    <select name="paymentMethod" className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white">
                      <option value="Efectivo">Efectivo</option>
                      <option value="Transferencia">Transferencia</option>
                    </select>
                  </div>
                </div>
                <button type="submit" disabled={stockByProduct[selectedProduct] <= 0} className={`w-full text-white font-bold py-4 rounded-xl mt-4 transition-colors ${stockByProduct[selectedProduct] > 0 ? 'bg-indigo-600 active:bg-indigo-700' : 'bg-gray-400 cursor-not-allowed'}`}>
                  {stockByProduct[selectedProduct] > 0 ? 'Completar Venta' : 'Sin Stock Suficiente'}
                </button>
              </form>
            </FormModal>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
